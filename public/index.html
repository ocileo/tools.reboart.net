<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolBox · Kumpulan Alat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #f4f7fc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app-wrapper {
      max-width: 1200px;
      width: 100%;
    }

    .app-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid rgba(0, 80, 200, 0.15);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      background: #1a4cff;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 16px rgba(26, 76, 255, 0.25);
    }

    .logo-text h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0b1b3a;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      font-size: 0.9rem;
      color: #4a5b7a;
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .search-box {
      background: white;
      padding: 8px 16px;
      border-radius: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #dce3ef;
      transition: 0.2s;
    }

    .search-box:focus-within {
      border-color: #1a4cff;
      box-shadow: 0 4px 12px rgba(26, 76, 255, 0.12);
    }

    .search-box i {
      color: #7b8aa5;
      font-size: 0.95rem;
    }

    .search-box input {
      border: none;
      outline: none;
      font-size: 0.95rem;
      padding: 6px 0;
      width: 170px;
      background: transparent;
    }

    .btn-primary {
      background: #1a4cff;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(26, 76, 255, 0.25);
    }

    .btn-primary:hover {
      background: #0d3de0;
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(26, 76, 255, 0.3);
    }

    .btn-secondary {
      background: white;
      border: 1px solid #dce3ef;
      color: #1f2a44;
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      background: #f0f4fe;
      border-color: #b3c6e8;
    }

    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .category-chip {
      background: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1f2a44;
      border: 1px solid #dce3ef;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }

    .category-chip:hover {
      background: #e9effa;
      border-color: #b0c4e8;
    }

    .category-chip.active {
      background: #1a4cff;
      color: white;
      border-color: #1a4cff;
      box-shadow: 0 4px 10px rgba(26, 76, 255, 0.2);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      margin: 28px 0 20px;
    }

    .tool-card {
      background: white;
      border-radius: 24px;
      padding: 24px 20px 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
      border: 1px solid #eef3fa;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 32px rgba(0, 20, 60, 0.08);
      border-color: #d0def5;
    }

    .tool-icon {
      font-size: 2.2rem;
      margin-bottom: 14px;
      color: #1a4cff;
      width: 56px;
      height: 56px;
      background: #eef4ff;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #0b1b3a;
      margin-bottom: 6px;
    }

    .tool-card p {
      color: #4f5e7a;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 16px;
      flex: 1;
    }

    .tool-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      border-top: 1px solid #eef3fa;
      padding-top: 14px;
    }

    .tool-tag {
      background: #e9effa;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #1f3a6b;
      letter-spacing: 0.3px;
    }

    .tool-btn {
      background: transparent;
      border: 1px solid #dce3ef;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.8rem;
      color: #1a2b4a;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tool-btn:hover {
      background: #1a4cff;
      border-color: #1a4cff;
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #4a5b7a;
      width: 100%;
    }

    .empty-state i {
      font-size: 3.5rem;
      color: #bcc9e0;
      margin-bottom: 1rem;
    }

    .app-footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #dce3ef;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: #5f6f8a;
      font-size: 0.9rem;
    }

    .footer-stats span {
      font-weight: 600;
      color: #0b1b3a;
    }

    @media (max-width: 650px) {
      .app-header {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }
      .header-actions {
        flex-wrap: wrap;
        justify-content: stretch;
      }
      .search-box input {
        width: 100%;
      }
      .search-box {
        flex: 1;
      }
      .btn-primary, .btn-secondary {
        justify-content: center;
        flex: 1;
      }
      .logo-text h1 {
        font-size: 1.5rem;
      }
      .tools-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 450px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="app-wrapper" id="app">
  <header class="app-header">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-toolbox"></i></div>
      <div class="logo-text">
        <h1>ToolBox</h1>
        <span>Penyedia tools serba guna</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Cari tools..." v-model="searchQuery" @input="filterTools">
      </div>
      <button class="btn-secondary" @click="resetFilter"><i class="fas fa-undo-alt"></i> Reset</button>
    </div>
  </header>

  <div class="category-bar">
    <span class="category-chip" :class="{ active: selectedCategory === '' }" @click="setCategory('')">📋 Semua</span>
    <span class="category-chip" v-for="cat in categories" :key="cat" 
          :class="{ active: selectedCategory === cat }" @click="setCategory(cat)">
      {{ cat }}
    </span>
  </div>

  <div class="tools-grid" v-if="filteredTools.length">
    <div class="tool-card" v-for="tool in filteredTools" :key="tool.id">
      <div class="tool-icon"><i :class="tool.icon"></i></div>
      <h3>{{ tool.name }}</h3>
      <p>{{ tool.desc }}</p>
      <div class="tool-meta">
        <span class="tool-tag">{{ tool.category }}</span>
        <button class="tool-btn" @click="useTool(tool)"><i class="fas fa-play"></i> Gunakan</button>
      </div>
    </div>
  </div>
  <div v-else class="empty-state">
    <i class="fas fa-box-open"></i>
    <p style="font-size: 1.1rem; font-weight: 500;">Tidak ada tools yang cocok</p>
    <p style="font-size: 0.95rem;">Coba kata kunci lain atau reset filter</p>
  </div>

  <div class="app-footer">
    <div class="footer-stats">
      <i class="fas fa-cubes" style="margin-right: 6px;"></i> 
      <span>{{ filteredTools.length }}</span> dari <span>{{ tools.length }}</span> tools tersedia
    </div>
    <div>
      <i class="fas fa-code"></i> ToolBox v1.0 · dibuat dengan <i class="fas fa-heart" style="color: #e74c6f;"></i>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
<script>
  (function() {
    const toolData = [
      { id: 1, name: 'JSON Formatter', desc: 'Format & validasi JSON dengan rapi.', category: 'Developer', icon: 'fas fa-code' },
      { id: 2, name: 'Password Generator', desc: 'Buat password kuat secara acak.', category: 'Keamanan', icon: 'fas fa-key' },
      { id: 3, name: 'Unit Converter', desc: 'Konversi panjang, berat, suhu, dan lainnya.', category: 'Konversi', icon: 'fas fa-ruler-combined' },
      { id: 4, name: 'QR Code Maker', desc: 'Hasilkan QR code dari teks atau URL.', category: 'Kreatif', icon: 'fas fa-qrcode' },
      { id: 5, name: 'Text Diff Checker', desc: 'Bandingkan dua teks dan lihat perbedaan.', category: 'Developer', icon: 'fas fa-columns' },
      { id: 6, name: 'Base64 Encoder', desc: 'Encode / decode Base64 dengan cepat.', category: 'Developer', icon: 'fas fa-shield-alt' },
      { id: 7, name: 'Color Picker', desc: 'Pilih warna dan dapatkan kode HEX/RGB.', category: 'Desain', icon: 'fas fa-palette' },
      { id: 8, name: 'Word Counter', desc: 'Hitung kata, karakter, dan paragraf.', category: 'Penulisan', icon: 'fas fa-file-alt' },
      { id: 9, name: 'Hash Generator', desc: 'Buat hash MD5, SHA-1, SHA-256.', category: 'Keamanan', icon: 'fas fa-fingerprint' },
      { id: 10, name: 'Timer & Stopwatch', desc: 'Alat pengukur waktu sederhana.', category: 'Utilitas', icon: 'fas fa-stopwatch' },
      { id: 11, name: 'URL Encode/Decode', desc: 'Encode atau decode URL parameter.', category: 'Developer', icon: 'fas fa-link' },
      { id: 12, name: 'Lorem Ipsum Generator', desc: 'Hasilkan teks placeholder untuk desain.', category: 'Penulisan', icon: 'fas fa-paragraph' }
    ];

    const cats = [...new Set(toolData.map(t => t.category))];

    new Vue({
      el: '#app',
      data: {
        tools: toolData,
        categories: cats,
        selectedCategory: '',
        searchQuery: '',
        filteredTools: toolData.slice()
      },
      methods: {
        filterTools() {
          let result = this.tools;
          if (this.selectedCategory) {
            result = result.filter(t => t.category === this.selectedCategory);
          }
          if (this.searchQuery.trim()) {
            const q = this.searchQuery.trim().toLowerCase();
            result = result.filter(t => 
              t.name.toLowerCase().includes(q) || 
              t.desc.toLowerCase().includes(q) ||
              t.category.toLowerCase().includes(q)
            );
          }
          this.filteredTools = result;
        },
        setCategory(cat) {
          this.selectedCategory = cat;
          this.filterTools();
        },
        resetFilter() {
          this.selectedCategory = '';
          this.searchQuery = '';
          this.filterTools();
        },
        useTool(tool) {
          alert(`🔧 Anda membuka tool: "${tool.name}"\nFungsi: ${tool.desc}\n(Klik OK untuk simulasi aksi)`);
        }
      },
      mounted() {
        this.filteredTools = this.tools.slice();
      }
    });
  })();
</script>
</body>
</html>
