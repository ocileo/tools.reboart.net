<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Live preview markdown dengan GitHub-style rendering. Edit dan lihat hasilnya real-time.">
    <meta name="theme-color" content="#6366f1">
    
    <title>Markdown Preview - ReboArt Tools</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255,255,255,0.06);
            --card: rgba(30,41,59,0.8);
        }
        [data-theme="light"] {
            --bg: #fff;
            --bg2: #f6f8fa;
            --text: #1f2328;
            --text2: #656d76;
            --border: rgba(0,0,0,0.08);
            --card: rgba(255,255,255,0.9);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Navbar */
        .navbar {
            height: 50px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 1rem;
        }
        .nav-back {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .nav-back:hover { color: var(--accent); background: rgba(99,102,241,0.1); }
        .nav-title {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-title i { color: var(--accent); }
        .nav-right {
            margin-left: auto;
            display: flex;
            gap: 6px;
        }
        .btn {
            height: 32px;
            padding: 0 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:hover { border-color: var(--accent); background: rgba(99,102,241,0.08); }
        .btn-icon {
            width: 32px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
        }

        /* Layout */
        .main {
            display: flex;
            height: calc(100vh - 50px);
        }

        /* Editor */
        .editor {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }
        .editor-header {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .editor-header span { display: flex; align-items: center; gap: 6px; }
        .editor-header i { color: var(--accent); }
        .toolbar { display: flex; gap: 3px; }
        .toolbar button {
            width: 26px;
            height: 26px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover { background: var(--bg2); color: var(--text); }

        textarea {
            flex: 1;
            width: 100%;
            padding: 1rem;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            resize: none;
            outline: none;
            tab-size: 2;
        }
        textarea::placeholder { color: var(--text2); opacity: 0.5; }
        .editor-footer {
            padding: 5px 14px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text2);
            display: flex;
            gap: 1rem;
            background: var(--card);
        }

        /* Preview */
        .preview {
            width: 50%;
            overflow-y: auto;
        }
        .preview-header {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            background: var(--card);
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .preview-header i { color: var(--accent); }
        .preview-content {
            padding: 1.5rem;
            max-width: 750px;
        }

        /* Markdown Style */
        .markdown-body {
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin: .8em 0 .5em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin: .8em 0 .5em; }
        .markdown-body h3 { font-size: 1.25em; margin: .8em 0 .5em; }
        .markdown-body p { margin-bottom: .8em; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body code {
            background: var(--bg2);
            padding: .2em .4em;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .85em;
            border: 1px solid var(--border);
        }
        .markdown-body pre {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: .8em;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            border: none;
            font-size: .85rem;
            line-height: 1.6;
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding: .5em 1em;
            margin: .8em 0;
            color: var(--text2);
            background: var(--card);
            border-radius: 0 6px 6px 0;
        }
        .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: .8em; }
        .markdown-body li { margin-bottom: .2em; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: .8em; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: .5em .8em; text-align: left; }
        .markdown-body th { background: var(--bg2); font-weight: 600; }
        .markdown-body tr:nth-child(even) { background: var(--card); }
        .markdown-body hr { border: none; border-top: 2px solid var(--border); margin: 1.5em 0; }
        .markdown-body img { max-width: 100%; border-radius: 6px; }
        .markdown-body input[type="checkbox"] { margin-right: .4em; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            padding: .6rem 1.2rem;
            border-radius: 50px;
            font-size: .85rem;
            font-weight: 500;
            z-index: 999;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .editor, .preview { width: 100%; height: 50%; }
            .editor { border-right: none; border-bottom: 1px solid var(--border); }
            .btn span { display: none; }
            .preview-content { padding: 1rem; }
            .nav-title span { display: none; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="../../" class="nav-back">
        <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <div class="nav-title">
        <i class="fa-brands fa-markdown"></i> <span>Markdown Preview</span>
    </div>
    <div class="nav-right">
        <button class="btn" id="btnTemplate"><i class="fas fa-file-code"></i> <span>Template</span></button>
        <button class="btn" id="btnCopy"><i class="fas fa-copy"></i> <span>Copy HTML</span></button>
        <button class="btn" id="btnDownload"><i class="fas fa-download"></i> <span>.md</span></button>
        <button class="btn btn-icon" id="btnTheme"><i class="fas fa-moon"></i></button>
    </div>
</nav>

<!-- Main -->
<div class="main">
    <!-- Editor -->
    <div class="editor">
        <div class="editor-header">
            <span><i class="fas fa-edit"></i> Editor</span>
            <div class="toolbar">
                <button id="btnBold" title="Bold (Ctrl+B)"><i class="fas fa-bold"></i></button>
                <button id="btnItalic" title="Italic (Ctrl+I)"><i class="fas fa-italic"></i></button>
                <button id="btnCode" title="Inline Code"><i class="fas fa-code"></i></button>
                <button id="btnLink" title="Link"><i class="fas fa-link"></i></button>
                <button id="btnImage" title="Image"><i class="fas fa-image"></i></button>
                <button id="btnClear" title="Clear All"><i class="fas fa-trash"></i></button>
            </div>
        </div>
        <textarea id="editor" placeholder="# Mulai menulis markdown..." spellcheck="false"></textarea>
        <div class="editor-footer">
            <span id="charCount">0 chars</span>
            <span id="wordCount">0 words</span>
            <span id="lineCount">0 lines</span>
        </div>
    </div>

    <!-- Preview -->
    <div class="preview">
        <div class="preview-header">
            <i class="fas fa-eye"></i> Preview
        </div>
        <div class="preview-content">
            <div class="markdown-body" id="preview"></div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMsg"></span>
</div>

<script>
(function() {
    'use strict';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    const btnTheme = document.getElementById('btnTheme');

    // Default template
    const defaultMd = `# Markdown Preview 🚀

## Fitur Utama
- **Live preview** real-time saat mengetik
- *GitHub Flavored Markdown* support
- Syntax highlighting untuk kode
- Dark & Light mode

## Contoh Kode

\`\`\`javascript
function greeting(name) {
    return \`Hello, \${name}!\`;
}
console.log(greeting('World'));
\`\`\`

\`\`\`python
def fibonacci(n):
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)
\`\`\`

## Tabel

| Fitur | Status | Keterangan |
|-------|--------|------------|
| Live Preview | ✅ | Real-time |
| GFM Support | ✅ | Tables, tasks |
| Highlight | ✅ | 190+ bahasa |
| Export | ✅ | HTML & .md |

## Blockquote

> "The best way to predict the future is to create it."
> — Peter Drucker

## Checklist
- [x] Support GitHub Flavored Markdown
- [x] Syntax highlighting
- [x] Dark mode
- [ ] PDF export (coming soon)

## Links
[ReboArt Tools](https://tools.reboart.net)

---

Made with ❤️`;

    // Load saved or default
    editor.value = localStorage.getItem('md-content') || defaultMd;

    // Configure marked
    if (typeof marked !== 'undefined') {
        marked.setOptions({
            gfm: true,
            breaks: true
        });
    }

    // Render function
    function render() {
        if (typeof marked !== 'undefined') {
            preview.innerHTML = marked.parse(editor.value);
        }
        if (typeof hljs !== 'undefined') {
            preview.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }
        updateStats();
        // Auto save
        localStorage.setItem('md-content', editor.value);
    }

    // Update stats
    function updateStats() {
        const text = editor.value;
        document.getElementById('charCount').textContent = text.length + ' chars';
        document.getElementById('wordCount').textContent = (text.trim() ? text.trim().split(/\s+/).length : 0) + ' words';
        document.getElementById('lineCount').textContent = (text ? text.split('\n').length : 0) + ' lines';
    }

    // Debounce render
    let renderTimeout;
    editor.addEventListener('input', function() {
        clearTimeout(renderTimeout);
        renderTimeout = setTimeout(render, 150);
    });

    // Toast notification
    let toastTimer;
    function showToast(msg) {
        toastMsg.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
            toast.classList.remove('show');
        }, 2000);
    }

    // Insert formatting helper
    function insertFormat(wrapper, placeholder) {
        var start = editor.selectionStart;
        var end = editor.selectionEnd;
        var text = editor.value.substring(start, end) || placeholder;
        editor.value = editor.value.substring(0, start) + wrapper.replace('{}', text) + editor.value.substring(end);
        editor.focus();
        var pos = start + wrapper.indexOf('{}');
        editor.setSelectionRange(pos, pos + text.length);
        render();
    }

    // Button events
    document.getElementById('btnBold').addEventListener('click', function() {
        insertFormat('**{}**', 'bold text');
    });
    document.getElementById('btnItalic').addEventListener('click', function() {
        insertFormat('*{}*', 'italic text');
    });
    document.getElementById('btnCode').addEventListener('click', function() {
        insertFormat('`{}`', 'code');
    });
    document.getElementById('btnLink').addEventListener('click', function() {
        insertFormat('[{}](url)', 'link text');
    });
    document.getElementById('btnImage').addEventListener('click', function() {
        insertFormat('![{}](url)', 'alt text');
    });
    document.getElementById('btnClear').addEventListener('click', function() {
        if (confirm('Clear semua konten?')) {
            editor.value = '';
            render();
            showToast('Editor cleared');
        }
    });

    // Template button
    document.getElementById('btnTemplate').addEventListener('click', function() {
        editor.value = defaultMd;
        render();
        showToast('Template loaded!');
    });

    // Copy HTML
    document.getElementById('btnCopy').addEventListener('click', function() {
        var html = preview.innerHTML;
        navigator.clipboard.writeText(html).then(function() {
            showToast('HTML copied!');
        }).catch(function() {
            showToast('Failed to copy');
        });
    });

    // Download .md
    document.getElementById('btnDownload').addEventListener('click', function() {
        var blob = new Blob([editor.value], { type: 'text/markdown' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'document.md';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded!');
    });

    // Theme toggle
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        btnTheme.querySelector('i').className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        localStorage.setItem('theme', theme);
        var hljsTheme = document.getElementById('hljs-theme');
        if (hljsTheme) {
            hljsTheme.href = theme === 'dark'
                ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
                : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
        }
    }

    btnTheme.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && document.activeElement === editor) {
            if (e.key === 'b') { e.preventDefault(); insertFormat('**{}**', 'bold'); }
            if (e.key === 'i') { e.preventDefault(); insertFormat('*{}*', 'italic'); }
            if (e.key === 's') { e.preventDefault(); 
                var blob = new Blob([editor.value], { type: 'text/markdown' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url; a.download = 'document.md'; a.click();
                URL.revokeObjectURL(url);
                showToast('Saved!');
            }
        }
        // Tab support
        if (e.key === 'Tab' && document.activeElement === editor) {
            e.preventDefault();
            var start = editor.selectionStart;
            editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(editor.selectionEnd);
            editor.selectionStart = editor.selectionEnd = start + 4;
        }
    });

    // Init
    (function init() {
        var savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        render();
    })();

})();
</script>
</body>
</html>
